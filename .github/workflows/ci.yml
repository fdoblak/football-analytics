# Foundation CI (Stage 2D) — least privilege, SHA-pinned official actions only.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        # v6
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python
        # v7
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.10.20"
          cache: pip
          cache-dependency-path: |
            requirements/ci.txt
            requirements/base.txt
            pyproject.toml

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/ci.txt
          python -m pip install -e . --no-deps

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: isort
        run: isort --check-only .

      - name: mypy
        run: mypy src/football_analytics

      - name: Build
        run: python -m build

      - name: Build content smoke
        run: |
          python - <<'PY'
          from pathlib import Path
          import tarfile
          sdist = next(Path("dist").glob("*.tar.gz"))
          names = tarfile.open(sdist, "r:gz").getnames()
          joined = "\n".join(names)
          assert "football_analytics/pipeline/" in joined or any(
              "/pipeline/" in n for n in names
          )
          assert any("cache_policy.yaml" in n for n in names)
          assert any("schemas/pipeline" in n or "schemas/cache" in n for n in names)
          assert not any(n.endswith(".parquet") for n in names)
          print("build_content_smoke=PASS")
          PY

      - name: Workflow safety
        run: python scripts/check_ci_workflow.py --workflow .github/workflows/ci.yml --strict

  tests:
    name: tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        # v6
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python
        # v7
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.10.20"
          cache: pip
          cache-dependency-path: |
            requirements/ci.txt
            requirements/base.txt
            pyproject.toml

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/ci.txt
          python -m pip install -e . --no-deps

      - name: Pytest
        run: python -m pytest

      - name: Runtime foundation
        run: python scripts/check_runtime_foundation.py --config configs/project/defaults.yaml

      - name: Data contracts synthetic
        run: >
          python scripts/check_data_contracts.py
          --registry configs/data/schema_registry.yaml
          --synthetic-roundtrip
          --migration-smoke

      - name: Stage cache synthetic
        run: python scripts/check_stage_cache.py --config configs/system/cache_policy.yaml --synthetic

      - name: Project check CI profile
        run: python scripts/check_project.py --profile ci --quick --strict

      - name: Secrets
        run: python scripts/check_secrets.py --root .

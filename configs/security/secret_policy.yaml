schema_version: 1
updated_at: "2026-07-22"
policy_id: football-analytics-secret-policy
storage:
  preferred:
    - environment_variables
    - gitignored_dotenv
    - os_credential_store_when_available
  forbidden:
    - yaml_registries
    - dataset_registry
    - model_registry
    - external_repos_lock
    - logs
    - manifests
    - screenshots_unredacted
    - git_tracked_files
patterns_monitored:
  - private_key_headers
  - github_tokens
  - aws_access_keys
  - bearer_tokens
  - url_query_secrets
  - password_assignments
  - dotenv_files
  - credential_extensions
redaction:
  logs: required
  reports: required
  screenshots: required
  scanner_evidence: prefix_suffix_only
incident:
  accidental_commit: rotate_then_purge_history_with_owner_approval
rotation: on_suspect_exposure_or_periodic_owner_schedule
notes: >
  This file is a technical policy index, not a legal guarantee.
  See docs/security/secrets_policy.md for procedures.
